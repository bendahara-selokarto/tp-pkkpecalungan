name: UI Runtime Evidence Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'resources/js/**'
      - 'e2e/**'
      - 'playwright.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ui-runtime-evidence-gate.yml'
  push:
    branches: [main]
    paths:
      - 'resources/js/**'
      - 'e2e/**'
      - 'playwright.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ui-runtime-evidence-gate.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 6,18 * * *'

permissions:
  contents: read

concurrency:
  group: ui-runtime-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-evidence:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    env:
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      CACHE_STORE: array
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      AUTH_LOGIN_MAX_ATTEMPTS: 60
      AUTH_LOGIN_DECAY_SECONDS: 60
      E2E_BASE_URL: http://127.0.0.1:8000
      E2E_WEB_SERVER_COMMAND: php artisan serve --host=127.0.0.1 --port=8000
      E2E_REQUIRE_AUTH: '1'
      E2E_REQUIRE_AUTH_A11Y: '1'
      E2E_DESA_EMAIL: e2e.desa@pkk.local
      E2E_DESA_PASSWORD: password123
      E2E_KECAMATAN_EMAIL: e2e.kecamatan@pkk.local
      E2E_KECAMATAN_PASSWORD: password123
      E2E_SUPERADMIN_EMAIL: e2e.superadmin@pkk.local
      E2E_SUPERADMIN_PASSWORD: password123
      PERF_HISTORY_CACHE_KEY: ui-perf-history-${{ github.ref_name }}-${{ github.run_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, pdo_sqlite, sqlite3
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Restore UI performance history cache
        uses: actions/cache/restore@v4
        with:
          path: reports/ui-runtime/perf/history
          key: ${{ env.PERF_HISTORY_CACHE_KEY }}
          restore-keys: |
            ui-perf-history-${{ github.ref_name }}-
            ui-perf-history-main-

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare environment and database
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          php artisan key:generate
          php artisan migrate --force
          php artisan db:seed --class=Database\\Seeders\\RoleSeeder --force
          php artisan db:seed --class=Database\\Seeders\\WilayahSeeder --force
          php artisan db:seed --class=Database\\Seeders\\E2ERuntimeUserSeeder --force

      - name: Build frontend assets
        run: npm run build

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Run UI smoke gate
        run: npm run test:e2e:smoke

      - name: Run UI accessibility gate
        run: npm run test:e2e:a11y

      - name: Run UI accessibility deep audit (non-blocking)
        continue-on-error: true
        env:
          E2E_A11Y_EXCLUDE_NPROGRESS: '0'
          E2E_A11Y_DISABLE_COLOR_CONTRAST: '0'
        run: npm run test:e2e:a11y

      - name: Run UI visual baseline audit (non-blocking)
        continue-on-error: true
        run: npm run test:e2e:visual

      - name: Run UI performance baseline audit (non-blocking)
        continue-on-error: true
        run: npm run test:e2e:perf

      - name: Summarize UI performance evidence (non-blocking)
        if: always()
        continue-on-error: true
        run: npm run test:e2e:perf:summary

      - name: Evaluate UI performance trend (non-blocking)
        if: always()
        continue-on-error: true
        run: npm run test:e2e:perf:trend

      - name: Enforce UI performance trend gate (main only)
        if: always() && github.ref == 'refs/heads/main'
        env:
          PERF_TREND_ENFORCE: '1'
        run: npm run test:e2e:perf:trend

      - name: Save UI performance history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: reports/ui-runtime/perf/history
          key: ${{ env.PERF_HISTORY_CACHE_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
            reports/ui-runtime
          if-no-files-found: ignore
