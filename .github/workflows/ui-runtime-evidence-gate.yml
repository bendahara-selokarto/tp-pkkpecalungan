name: UI Runtime Evidence Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'resources/js/**'
      - 'e2e/**'
      - 'playwright.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ui-runtime-evidence-gate.yml'
  push:
    branches: [main]
    paths:
      - 'resources/js/**'
      - 'e2e/**'
      - 'playwright.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ui-runtime-evidence-gate.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-runtime-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-evidence:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    env:
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      AUTH_LOGIN_MAX_ATTEMPTS: 60
      AUTH_LOGIN_DECAY_SECONDS: 60
      E2E_BASE_URL: http://127.0.0.1:8000
      E2E_WEB_SERVER_COMMAND: php artisan serve --host=127.0.0.1 --port=8000
      E2E_REQUIRE_AUTH: '1'
      E2E_REQUIRE_AUTH_A11Y: '0'
      E2E_DESA_EMAIL: e2e.desa@pkk.local
      E2E_DESA_PASSWORD: password123
      E2E_KECAMATAN_EMAIL: e2e.kecamatan@pkk.local
      E2E_KECAMATAN_PASSWORD: password123
      E2E_SUPERADMIN_EMAIL: e2e.superadmin@pkk.local
      E2E_SUPERADMIN_PASSWORD: password123

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, pdo_sqlite, sqlite3
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare environment and database
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          php artisan key:generate
          php artisan migrate --force
          php artisan db:seed --class=Database\\Seeders\\RoleSeeder --force
          php artisan db:seed --class=Database\\Seeders\\WilayahSeeder --force
          php artisan db:seed --class=Database\\Seeders\\E2ERuntimeUserSeeder --force

      - name: Build frontend assets
        run: npm run build

      - name: Install Playwright browser
        run: npm run test:e2e:install

      - name: Run UI smoke gate
        run: npm run test:e2e:smoke

      - name: Run UI accessibility gate
        run: npm run test:e2e:a11y

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
